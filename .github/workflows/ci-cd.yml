name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: workshop
          POSTGRES_PASSWORD: workshop123
          POSTGRES_DB: workshop_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U workshop"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://workshop:workshop123@localhost:5432/workshop_db?schema=public
      JWT_SECRET: test-jwt-secret-for-ci
      JWT_EXPIRATION: 24h
      API_PREFIX: api/v1
      NODE_ENV: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma db push

      - name: Build application
        run: npm run build

      - name: Run unit tests
        run: npm test

      - name: Run E2E tests
        run: npm run test:e2e

  build-image:
    name: Build Docker Image
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: fiap-mecanica:latest
          outputs: type=docker,dest=/tmp/fiap-mecanica.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/fiap-mecanica.tar
          retention-days: 1

  deploy:
    name: Deploy to Kind
    needs: build-image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Install Kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.22.0/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.29.2'

      - name: Create Kind cluster
        run: |
          cat <<EOF | kind create cluster --name fiap-mecanica-cluster --config=-
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          nodes:
          - role: control-plane
            extraPortMappings:
            - containerPort: 30000
              hostPort: 30000
              protocol: TCP
          - role: worker
          EOF

      - name: Load Docker image into Kind
        run: |
          docker load -i /tmp/fiap-mecanica.tar
          kind load docker-image fiap-mecanica:latest --name fiap-mecanica-cluster

      - name: Apply Kubernetes manifests
        run: kubectl apply -k k8s/

      - name: Wait for PostgreSQL rollout
        run: kubectl rollout status deployment/postgres -n fiap-mecanica --timeout=120s

      - name: Wait for application rollout
        run: kubectl rollout status deployment/fiap-mecanica-app -n fiap-mecanica --timeout=180s

      - name: Verify deployment
        run: |
          kubectl get pods -n fiap-mecanica
          kubectl get svc -n fiap-mecanica
          kubectl get hpa -n fiap-mecanica
