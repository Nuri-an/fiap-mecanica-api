apiVersion: apps/v1
kind: Deployment
metadata:
  name: fiap-mecanica-app
  namespace: fiap-mecanica
  labels:
    app: fiap-mecanica-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fiap-mecanica-app
  template:
    metadata:
      labels:
        app: fiap-mecanica-app
    spec:
      initContainers:
        - name: migrate
          image: fiap-mecanica:latest
          imagePullPolicy: IfNotPresent
          command: ['npx', 'prisma', 'migrate', 'deploy']
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: fiap-mecanica-secret
                  key: DATABASE_URL
      containers:
        - name: app
          image: fiap-mecanica:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: fiap-mecanica-config
                  key: NODE_ENV
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: fiap-mecanica-config
                  key: PORT
            - name: API_PREFIX
              valueFrom:
                configMapKeyRef:
                  name: fiap-mecanica-config
                  key: API_PREFIX
            - name: JWT_EXPIRATION
              valueFrom:
                configMapKeyRef:
                  name: fiap-mecanica-config
                  key: JWT_EXPIRATION
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: fiap-mecanica-secret
                  key: JWT_SECRET
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: fiap-mecanica-secret
                  key: DATABASE_URL
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
